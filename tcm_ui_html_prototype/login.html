<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>中医问诊系统 - 登录</title><link rel="stylesheet" href="styles.css"></head><body>
<div class="login-app">
  <section class="login-left">
    <h1 class="login-title">中医问诊系统</h1>
    <div class="login-sub">AI 驱动的中医智能问诊平台</div>
    <div class="feature"><div class="feature-icon">☷</div><div><b>智能问诊</b><span>多轮对话理解病情，生成结构化病历</span></div></div>
    <div class="feature"><div class="feature-icon">◇</div><div><b>辅助辨证</b><span>结合中医理论，辅助辨证分析与处方建议</span></div></div>
    <div class="feature"><div class="feature-icon">□</div><div><b>档案管理</b><span>患者档案与历史记录，便于追踪与管理</span></div></div>
  </section>
  <main class="login-card-wrap">
    <form class="login-card">
      <div class="login-tabs"><span class="active">登录</span><span>创建账号</span></div>
      <label class="label">账号</label><div class="login-input">♙ <span>请输入账号</span></div>
      <label class="label">密码</label><div class="login-input">▣ <span style="flex:1">请输入密码</span><span>◎</span></div>
      <div class="login-row"><label><input type="checkbox"> 记住我</label><span>忘记密码？</span></div>
      <button class="btn primary login-btn" type="button">登录</button>
      <div class="login-bottom">还没有账号？ <b>立即创建账号</b></div>
    </form>
  </main>
</div></body></html>
