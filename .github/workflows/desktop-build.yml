name: Build desktop apps

on:
  workflow_dispatch:
  push:
    branches: [main]
    tags: ['v*']

permissions:
  contents: read

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            command: build:desktop:win
            artifact: windows
            paths: |
              release/*.exe
              release/*.blockmap
              release/latest*.yml
          - os: macos-latest
            command: build:desktop:mac
            artifact: macos
            paths: |
              release/*.dmg
              release/*.zip
              release/*.blockmap
              release/latest*.yml

    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash

    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run ${{ matrix.command }}
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
      - uses: actions/upload-artifact@v4
        with:
          name: tcm-consultation-${{ matrix.artifact }}
          path: ${{ matrix.paths }}
          if-no-files-found: error
