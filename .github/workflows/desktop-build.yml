name: Build desktop apps

on:
  workflow_dispatch:
  push:
    branches: [main]
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            command: build:desktop:win
            artifact: windows
            paths: |
              release/*.exe
              release/*.blockmap
              release/latest*.yml
          - os: macos-latest
            command: build:desktop:mac
            artifact: macos
            paths: |
              release/*.dmg
              release/*.zip
              release/*.blockmap
              release/latest*.yml

    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash

    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Build desktop package
        run: pnpm run ${{ matrix.command }}
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
      - name: Upload workflow artifact
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: tcm-consultation-${{ matrix.artifact }}
          path: ${{ matrix.paths }}
          if-no-files-found: error

  publish:
    if: ${{ startsWith(github.ref, 'refs/tags/v') }}
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Download desktop packages
        uses: actions/download-artifact@v4
        with:
          pattern: tcm-consultation-*
          path: release
          merge-multiple: true
      - name: Publish desktop update
        shell: bash
        run: |
          if ! gh release view "$GITHUB_REF_NAME"; then
            gh release create "$GITHUB_REF_NAME" --verify-tag --title "${GITHUB_REF_NAME#v}" --generate-notes
          fi
          gh release upload "$GITHUB_REF_NAME" \
            release/latest*.yml \
            release/*.exe \
            release/*.dmg \
            release/*.zip \
            release/*.blockmap \
            --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
